name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  # ---------------------------------------------------------------------------
  # Unit Tests
  # ---------------------------------------------------------------------------
  test:
    name: Backend Unit Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest pytest-asyncio \
            requests httpx \
            fastapi "uvicorn[standard]" pydantic python-multipart aiofiles \
            sqlalchemy \
            anthropic openai

      # RDKit is optional — tests gracefully skip if not installed
      - name: Install RDKit (optional)
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxrender1 libxext6 libxinerama1
          pip install rdkit

      - name: Run unit tests (no external API calls)
        run: pytest -m "not integration"
        env:
          PYTHONPATH: .

  # ---------------------------------------------------------------------------
  # Dependency vulnerability scan (Secure SDLC)
  # ---------------------------------------------------------------------------
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit and core deps
        run: |
          pip install pip-audit
          pip install \
            fastapi "uvicorn[standard]" pydantic python-multipart aiofiles \
            sqlalchemy httpx requests anthropic openai

      - name: Audit installed packages for known CVEs
        run: pip-audit --skip-editable

  # ---------------------------------------------------------------------------
  # Secret scanning (Secure SDLC / GitHub secure practices)
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout (full history for trufflehog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: master
          head: HEAD
          extra_args: --only-verified
