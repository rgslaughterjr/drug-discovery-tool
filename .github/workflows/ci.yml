name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Backend Unit Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # RDKit system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxrender1 libxext6 libxinerama1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest pytest-asyncio httpx \
            fastapi uvicorn[standard] pydantic python-multipart aiofiles \
            sqlalchemy \
            httpx \
            anthropic openai \
            rdkit-pypi

      - name: Run unit tests (no external API calls)
        run: pytest -m "not integration"
        env:
          # No real keys needed — unit tests are fully mocked / in-memory
          PYTHONPATH: .

  # ---------------------------------------------------------------------------
  # Dependency vulnerability scan (Secure SDLC)
  # ---------------------------------------------------------------------------
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969

  # ---------------------------------------------------------------------------
  # Secret scanning (Secure SDLC / GitHub secure practices)
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout (full history for trufflehog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
