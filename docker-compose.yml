version: '3.9'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DISCOVERY_PROVIDER=anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-}
      - DISCOVERY_MODEL=claude-3-5-sonnet-20241022
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    image: node:18-alpine
    working_dir: /app/web
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app/web
      - /app/web/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    command: sh -c "npm install && npm start"
    stdin_open: true
    tty: true

volumes:
  backend_data:
