version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: backend-builder
    image: drug-discovery-backend-dev
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src        # hot-reload Python source
      - ../prompts:/app/prompts
      - ../data:/app/data      # SQLite persistence across restarts
    environment:
      - PYTHONPATH=/app
      - DB_PATH=/app/data/research.db
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    env_file:
      - ../.env.local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../web
      dockerfile: Dockerfile.dev
    image: drug-discovery-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ../web/src:/app/src   # hot-reload React source
      - ../web/public:/app/public
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    env_file:
      - ../.env.local
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
